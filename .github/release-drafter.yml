name-template: 'v$RESOLVED_VERSION'
tag-template: '$RESOLVED_VERSION'

categories:
  - title: '🚀 新功能'
    when:
      labels:
        - 'feat'
        - 'feature'
        - 'enhancement'
    semver-increment: minor

  - title: '🐛 修复'
    when:
      labels:
        - 'fix'
        - 'bugfix'
        - 'bug'
    semver-increment: patch

  - title: '🧹 维护'
    when:
      label: 'chore'
      
  - type: 'pre-exclude'
    when:
      label: 'skip-changelog'

change-template: '- $TITLE (#$NUMBER) @$AUTHOR'

template: |
  ## 🎉 更新内容
  $CHANGES
